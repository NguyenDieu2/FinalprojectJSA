<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

<body>
    <header>
        <nav>
            <img src="../assets/img/logo.png" alt="DIEU" class="logo">
            <ul class="nav-links">
                <li><a href="./main.html">Trang chủ</a></li>
                <li><a href="#products">Sản phẩm</a></li>
                <li><a href="#"><img class="cart" src="./img/cart.png" alt=""></a></li>
            </ul>
            <form class="d-flex">
                <input class="form-control me-2"  type="text" placeholder="Hãy tìm kiếm một số thứ">
                <button class="btn btn-primary"  type="button">Tìm kiếm</button>

    <section class="products" id="products">

                    <div class="quantity">
                        <button type="button">+</button>
                        <span class="product-price">Số lượng: 1</span>
                        <button type="button">-</button>
                    </div>
                    <div class="color">
                        <p class="option">Màu Đen</p>

                    </div>
